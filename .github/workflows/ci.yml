name: PetSpace CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. 분석 + 테스트
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter SDK 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 의존성 설치
        working-directory: pjh
        run: flutter pub get

      - name: secrets.dart 생성 (CI용 더미)
        working-directory: pjh
        run: |
          mkdir -p lib/config
          cat > lib/config/secrets.dart << 'EOF'
          const String supabaseUrl = '';
          const String supabaseAnonKey = '';
          const String geminiApiKey = '';
          const String kakaoNativeKey = '';
          EOF

      - name: 코드 포맷 검사
        working-directory: pjh
        run: dart format --output=none --set-exit-if-changed lib/

      - name: 정적 분석 (flutter analyze)
        working-directory: pjh
        run: flutter analyze --no-pub

      - name: 단위 테스트
        working-directory: pjh
        run: |
          flutter test \
            test/features/auth/presentation/bloc/auth_bloc_test.dart \
            test/features/emotion/presentation/bloc/emotion_analysis_bloc_test.dart \
            test/features/health/domain/usecases/health_usecases_test.dart \
            test/features/social/domain/usecases/bookmark_usecases_test.dart \
            --reporter=expanded

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Android 빌드 (main 브랜치 push 시)
  # ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter SDK 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 의존성 설치
        working-directory: pjh
        run: flutter pub get

      - name: secrets.dart 생성 (CI용 더미)
        working-directory: pjh
        run: |
          mkdir -p lib/config
          cat > lib/config/secrets.dart << 'EOF'
          const String supabaseUrl = '';
          const String supabaseAnonKey = '';
          const String geminiApiKey = '';
          const String kakaoNativeKey = '';
          EOF

      - name: Android APK 빌드
        working-directory: pjh
        run: flutter build apk --release --split-per-abi

      - name: APK 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: petspace-apk-${{ github.sha }}
          path: pjh/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
